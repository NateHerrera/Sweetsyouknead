<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%PUBLIC_URL%/images/Sweetsyoukneadlogotrans.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#fff8f3" />
		<meta
			name="description"
			content="Precious Sol Bakery creates custom cakes, wedding cakes, birthday cakes, and handcrafted desserts in San Antonio, TX."
		/>
		<link
			rel="apple-touch-icon"
			href="%PUBLIC_URL%/images/Sweetsyoukneadlogotrans.png"
		/>
		<link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
		<link
			href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap"
			rel="stylesheet"
		/>
		<title>
			Precious Sol Bakery | Custom Cakes &amp; Desserts in San Antonio
		</title>

		<!-- Open Graph -->
		<meta
			property="og:title"
			content="Precious Sol Bakery | Custom Cakes & Desserts"
		/>
		<meta
			property="og:description"
			content="Precious Sol Bakery creates custom cakes, wedding cakes, birthday cakes, and handcrafted desserts in San Antonio, TX."
		/>
		<meta
			property="og:image"
			content="https://precioussol.com/images/PreciousSolLogo.png"
		/>
		<meta property="og:url" content="https://precioussol.com/" />
		<meta property="og:type" content="website" />

		<!-- Twitter Card -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta
			name="twitter:title"
			content="Precious Sol Bakery | Custom Cakes & Desserts"
		/>
		<meta
			name="twitter:description"
			content="Precious Sol Bakery creates custom cakes, wedding cakes, birthday cakes, and handcrafted desserts in San Antonio, TX."
		/>
		<meta
			name="twitter:image"
			content="https://precioussol.com/images/PreciousSolLogo.png"
		/>

		<!-- Local business structured data -->
		<script type="application/ld+json">
			{
				"@context": "https://schema.org",
				"@type": "Bakery",
				"name": "Precious Sol Bakery",
				"url": "https://precioussol.com",
				"description": "Custom cakes, wedding cakes, birthday cakes, and handcrafted desserts in San Antonio, TX.",
				"image": "https://precioussol.com/images/PreciousSolLogo.png",
				"address": {
					"@type": "PostalAddress",
					"addressLocality": "San Antonio",
					"addressRegion": "TX"
				},
				"openingHoursSpecification": {
					"@type": "OpeningHoursSpecification",
					"dayOfWeek": [
						"Monday",
						"Tuesday",
						"Wednesday",
						"Thursday",
						"Friday",
						"Saturday",
						"Sunday"
					],
					"opens": "07:00",
					"closes": "19:00"
				}
			}
		</script>
	</head>
	<body>
		<noscript>You need to enable JavaScript to run this app.</noscript>
		<div id="root"></div>
	</body>
</html>
